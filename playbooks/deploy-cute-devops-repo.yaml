---
- name: Deploy cute-devops library as a bare git repo with treehouses layout
  hosts: cute_devops_repo
  remote_user: root
  vars:
    repos:
      - name: cute-devops
        path: /srv/repos/cute-devops.git
        group: devops
        owner: root
        description: "Cute DevOps Patterns! — Ansible roles + patterns. https://devops.patterns.how"
  roles:
    - role: repos
