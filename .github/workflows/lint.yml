name: Ansible Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - name: Install prerequisites
        env:
          DEBIAN_FRONTEND: noninteractive
        run: >-
          apt-get update && apt-get install -y --no-install-recommends
          ca-certificates git ansible ansible-lint

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run ansible-lint
        run: >-
          ansible-lint
