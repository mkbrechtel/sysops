---
- name: Import deploy instance role
  ansible.builtin.import_role:
    role: deploy_instance
  vars:
    deploy_instance_id: "{{ deploy_test_ohai_instance_id }}"

- name: Template init script for deploy instance {{ deploy_test_ohai_instance_id }}
  ansible.builtin.template:
    src: 01-test-ohai-init.j2
    dest: "{{ deploy_instance_path }}/01-test-ohai-init"
    mode: "0755"

- name: Template deploy script for deploy instance {{ deploy_test_ohai_instance_id }}
  ansible.builtin.template:
    src: 02-test-ohai.j2
    dest: "{{ deploy_instance_path }}/02-test-ohai"
    mode: "0755"
