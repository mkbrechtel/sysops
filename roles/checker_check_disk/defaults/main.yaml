---
checker_check_disk_warning: 20%
checker_check_disk_critical: 10%
checker_check_disk_paths: [] # Default empty, must be specified
checker_check_disk_exclude_types: []
checker_check_disk_include_types: []
checker_check_disk_local_only: true
checker_check_disk_timeout: 30
checker_check_disk_units: MB
checker_check_disk_id: "disk"
checker_check_disk_interval: "1h"
