---

- name: Import deploy instance role
  import_role:
    role: deploy_instance

- name: Template init script for the {{ deploy_instance_id }} deploy instance
  template:
    src: 01-ansible-play.init.j2
    dest: "{{ deploy_instance_path }}/01-ansible-play.init"
    mode: '0755'

- name: Template deploy script for the {{ deploy_instance_id }} deploy instance
  template:
    src: 01-ansible-play.j2
    dest: "{{ deploy_instance_path }}/01-ansible-play"
    mode: '0755'
