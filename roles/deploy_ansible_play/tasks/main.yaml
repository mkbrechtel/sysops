---
- name: Import deploy instance role
  ansible.builtin.import_role:
    role: deploy_instance
  vars:
    deploy_instance_id: "{{ deploy_ansible_play_instance_id }}"

- name: Template init script for deploy instance {{ deploy_instance_id }}
  ansible.builtin.template:
    src: 01-ansible-play-init.j2
    dest: "{{ deploy_instance_path }}/01-ansible-play-init"
    mode: "0755"

- name: Template deploy script for deploy instance {{ deploy_instance_id }}
  ansible.builtin.template:
    src: 02-ansible-play.j2
    dest: "{{ deploy_instance_path }}/02-ansible-play"
    mode: "0755"
