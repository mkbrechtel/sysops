---
- name: Debian packages
  ansible.builtin.apt:
    pkg:
      - ansible
      - ansible-core
      - ansible-lint
      - ansible-mitogen
      - python3-jmespath
      - python3-pymysql
      - python3-dnspython
      - python3-libcloud
      - python3-netaddr

- name: Ansible etc directory
  ansible.builtin.file:
    path: /etc/ansible
    state: directory
    mode: "0755"

- name: Ansible config
  ansible.builtin.template:
    src: ansible.cfg.j2
    dest: /etc/ansible/ansible.cfg
    mode: "0644"
